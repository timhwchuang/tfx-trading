[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "strategy-opening-range-breakout"
version = "0.1.0"
description = "FT-009 Opening Range Breakout plugin for trading-engine"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
  {name = "strategy-opening-range-breakout maintainers"}
]
dependencies = [
    "trading-engine>=0.2.3,<1.0",
]

[project.entry-points."trading_engine.strategies"]
opening_range_breakout = "strategy_opening_range_breakout:OpeningRangeBreakoutStrategy"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"strategy_opening_range_breakout" = ["py.typed"]
