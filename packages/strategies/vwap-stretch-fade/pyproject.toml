[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "strategy-vwap-stretch-fade"
version = "0.1.0"
description = "FT-006 VWAP stretch fade (mean reversion) plugin for trading-engine"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
  {name = "strategy-vwap-stretch-fade maintainers"}
]
dependencies = [
    "trading-engine>=0.2.3,<1.0",
]

[project.entry-points."trading_engine.strategies"]
vwap_stretch_fade = "strategy_vwap_stretch_fade:VwapStretchFadeStrategy"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"strategy_vwap_stretch_fade" = ["py.typed"]
