[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "strategy-momentum-continuation"
version = "0.1.0"
description = "FT-004 armed-forward momentum continuation plugin for trading-engine"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
  {name = "strategy-momentum-continuation maintainers"}
]
dependencies = [
    "trading-engine>=0.2.3,<1.0",
]

[project.entry-points."trading_engine.strategies"]
momentum_continuation = "strategy_momentum_continuation:MomentumContinuationStrategy"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"strategy_momentum_continuation" = ["py.typed"]
